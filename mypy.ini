[mypy]
python_version = 3.13
warn_return_any = True
warn_unused_configs = False
warn_unused_ignores = True

[mypy-spatialdata.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-dask.*]
ignore_missing_imports = True

[mypy-skimage.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-shapely.*]
ignore_missing_imports = True

[mypy-geopandas]
ignore_missing_imports = True

[mypy-geopandas.*]
ignore_missing_imports = True

[mypy-rasterio]
ignore_missing_imports = True

[mypy-rasterio.*]
ignore_missing_imports = True

# io/ and geometry/ modules use untyped third-party deps (geopandas, rasterio,
# spatialdata) and are excluded from mypyc compilation; relax strict checks.
[mypy-cellmeasurement.io.*]
ignore_errors = True

[mypy-cellmeasurement.geometry.*]
ignore_errors = True
